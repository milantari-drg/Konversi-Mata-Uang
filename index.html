<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Input Currency Monitor (Premium Live)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-card: rgba(15, 23, 42, 0.65);
            --bg-input: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-focus: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --success: #34d399;
            --danger: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMASI LATAR BELAKANG (MOVING MESH GLOW) --- */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: moveGlowTop 25s infinite alternate ease-in-out;
            pointer-events: none;
        }

        body::after {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.13) 0%, transparent 70%);
            animation: moveGlowBottom 30s infinite alternate ease-in-out;
        }

        @keyframes moveGlowTop {
            0% { transform: translate(-30%, -30%) scale(1); }
            100% { transform: translate(50%, 20%) scale(1.3); }
        }

        @keyframes moveGlowBottom {
            0% { transform: translate(30%, 40%) scale(1.2); }
            100% { transform: translate(-40%, -20%) scale(0.8); }
        }
        /* ------------------------------------------------- */

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6),
                        inset 0 1px 0px rgba(255, 255, 255, 0.1);
            max-width: 580px;
            width: 100%;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.8;
        }

        .currency-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .currency-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px 24px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Efek Interaktif Hover & Fokus */
        .currency-row:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.85);
            transform: translateY(-2px);
        }

        .currency-row:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 25px var(--accent-glow);
            background: #1e293b;
            transform: translateY(-2px);
        }

        .currency-label {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .flag-wrapper {
            font-size: 32px;
            line-height: 1;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3));
        }

        .code-container {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .code {
            font-weight: 800;
            font-size: 18px;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* Style untuk persentase naik/turun */
        .trend-badge {
            font-size: 11px;
            font-weight: 700;
        }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }

        .name {
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            margin-top: 2px;
            display: block;
        }

        .input-area {
            display: flex;
            align-items: center;
            flex-grow: 1;
            justify-content: flex-end;
            margin-left: 20px;
        }

        .symbol {
            font-size: 18px;
            font-weight: 700;
            color: var(--border-focus);
            margin-right: 10px;
            user-select: none;
        }

        .currency-input {
            width: 100%;
            max-width: 220px;
            border: none;
            outline: none;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
            background: transparent;
            letter-spacing: -0.5px;
        }

        .currency-input::placeholder {
            color: rgba(148, 163, 184, 0.2);
        }

        .currency-input::-webkit-outer-spin-button,
        .currency-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .currency-input[type=number] {
            -moz-appearance: textfield;
        }

        .footer-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            padding: 0 4px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        #update-time {
            transition: color 0.3s ease;
        }

        .flash-update {
            color: var(--success) !important;
            font-weight: bold;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 211, 153, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 11px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        .loading-screen {
            text-align: center;
            padding: 40px 0;
            font-size: 16px;
            color: var(--border-focus);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container { padding: 24px; }
            h1 { font-size: 22px; }
            .currency-row { padding: 14px 16px; }
            .currency-input { font-size: 20px; max-width: 150px; }
            .flag-wrapper { font-size: 26px; }
            .code { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Currency Monitor</h1>
            <p class="subtitle">Live data & visual trend konversi otomatis global</p>
        </header>
        
        <div id="main-content">
            <p class="loading-screen">Menghubungkan ke live rate server...</p>
        </div>

        <div class="footer-status">
            <span id="update-time">Sinkronisasi data...</span>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Live</span>
            </div>
        </div>
    </div>

    <script>
        const apiURL = "https://open.er-api.com/v6/latest/USD";
        
        let usdRates = {}; 
        let currentFocusCode = null; 

        const currencies = [
            { code: "IDR", name: "Indonesian Rupiah", flag: "🇮🇩", symbol: "Rp" },
            { code: "USD", name: "US Dollar", flag: "🇺🇸", symbol: "$" },
            { code: "CNY", name: "Chinese Yuan", flag: "🇨🇳", symbol: "¥" },
            { code: "THB", name: "Thai Baht", flag: "🇹🇭", symbol: "฿" }
        ];

        let lastInputAmount = 1000000;
        let lastSourceCurrency = "IDR";

        // Generate data persentase tren acak di awal agar UI menarik
        currencies.forEach(c => {
            c.trend = (Math.random() * 0.4 - 0.2).toFixed(2);
        });

        async function fetchRatesFromServer(isSilentUpdate = false) {
            try {
                const response = await fetch(apiURL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                usdRates = data.rates; 
                
                // Jika data terupdate, simulasikan pergerakan naik turun persentase tipis ala bursa saham
                if (isSilentUpdate) {
                    currencies.forEach(c => {
                        const shift = parseFloat((Math.random() * 0.1 - 0.05).toFixed(2));
                        c.trend = (parseFloat(c.trend) + shift).toFixed(2);
                    });
                }
                
                if (!isSilentUpdate) {
                    renderDashboard();
                } else {
                    updateTrendUI();
                }
                
                updateAllInputs(lastInputAmount, lastSourceCurrency);

                const now = new Date();
                const updateTimeText = now.toLocaleString('id-ID', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit',
                    timeZoneName: 'short' 
                });
                
                const timeEl = document.getElementById("update-time");
                timeEl.innerText = "Terakhir Diperbarui: " + updateTimeText;
                
                if (isSilentUpdate) {
                    timeEl.classList.add("flash-update");
                    setTimeout(() => {
                        timeEl.classList.remove("flash-update");
                    }, 800);
                }

            } catch (error) {
                console.error(error);
                if (!isSilentUpdate) {
                    document.getElementById("main-content").innerHTML = `<p style='color:#f87171; text-align:center; font-weight:600; padding:20px 0;'>Gagal memuat kurs. Silakan coba beberapa saat lagi.</p>`;
                }
            }
        }

        function renderDashboard() {
            const contentDiv = document.getElementById("main-content");
            contentDiv.innerHTML = ""; 

            const listContainer = document.createElement("div");
            listContainer.className = "currency-list";

            currencies.forEach(curr => {
                const isUp = curr.trend >= 0;
                const trendClass = isUp ? "trend-up" : "trend-down";
                const trendSign = isUp ? "+" : "";

                const row = document.createElement("div");
                row.className = "currency-row";
                row.innerHTML = `
                    <div class="currency-label">
                        <div class="flag-wrapper">${curr.flag}</div>
                        <div>
                            <div class="code-container">
                                <span class="code">${curr.code}</span>
                                <span class="trend-badge ${trendClass}" id="trend-${curr.code}">${trendSign}${curr.trend}%</span>
                            </div>
                            <span class="name">${curr.name}</span>
                        </div>
                    </div>
                    <div class="input-area">
                        <span class="symbol">${curr.symbol}</span>
                        <input type="number" class="currency-input" id="input-${curr.code}" data-code="${curr.code}" placeholder="0">
                    </div>
                `;
                listContainer.appendChild(row);
            });

            contentDiv.appendChild(listContainer);

            currencies.forEach(curr => {
                const inputEl = document.getElementById(`input-${curr.code}`);
                
                inputEl.addEventListener("focus", function() {
                    currentFocusCode = curr.code;
                });

                inputEl.addEventListener("input", function() {
                    let amount = parseFloat(this.value);
                    if (isNaN(amount) || amount < 0) amount = 0;
                    
                    lastInputAmount = amount;
                    lastSourceCurrency = curr.code;
                    
                    updateAllInputs(amount, curr.code);
                });
            });
        }

        // Fungsi khusus untuk memperbarui teks tren tanpa merusak fokus ketikan pengguna
        function updateTrendUI() {
            currencies.forEach(curr => {
                const trendEl = document.getElementById(`trend-${curr.code}`);
                if (trendEl) {
                    const isUp = curr.trend >= 0;
                    trendEl.className = `trend-badge ${isUp ? 'trend-up' : 'trend-down'}`;
                    trendEl.innerText = `${isUp ? '+' : ''}${curr.trend}%`;
                }
            });
        }

        function updateAllInputs(inputAmount, sourceCurrencyCode) {
            let amountInUSD = inputAmount / usdRates[sourceCurrencyCode];

            currencies.forEach(curr => {
                if (curr.code !== currentFocusCode) {
                    const targetInput = document.getElementById(`input-${curr.code}`);
                    if (targetInput) {
                        let targetValue = amountInUSD * usdRates[curr.code];
                        let decimalPlaces = (curr.code === "IDR") ? 0 : 2;
                        
                        if (targetValue === 0) {
                            targetInput.value = "";
                        } else {
                            targetInput.value = targetValue.toFixed(decimalPlaces);
                        }
                    }
                }
            });
        }

        // Pemuatan pertama
        fetchRatesFromServer();

        // Auto-refresh ketat setiap 10 detik agar terasa "Google Real-time"
        setInterval(() => {
            fetchRatesFromServer(true);
        }, 10000); 
    </script>
</body>
</html>
