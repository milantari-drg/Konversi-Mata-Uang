<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Input Currency Monitor (Premium Live)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💱</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-card: rgba(15, 23, 42, 0.65);
            --bg-input: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-focus: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --success: #34d399;
            --danger: #f87171;
            --bg-custom-row: rgba(56, 189, 248, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMASI LATAR BELAKANG --- */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: moveGlowTop 25s infinite alternate ease-in-out;
            pointer-events: none;
        }
        body::after {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.13) 0%, transparent 70%);
            animation: moveGlowBottom 30s infinite alternate ease-in-out;
        }
        @keyframes moveGlowTop {
            0% { transform: translate(-30%, -30%) scale(1); }
            100% { transform: translate(50%, 20%) scale(1.3); }
        }
        @keyframes moveGlowBottom {
            0% { transform: translate(30%, 40%) scale(1.2); }
            100% { transform: translate(-40%, -20%) scale(0.8); }
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6),
                        inset 0 1px 0px rgba(255, 255, 255, 0.1);
            max-width: 580px;
            width: 100%;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .header-logo {
            font-size: 26px;
            background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(56, 189, 248, 0.4));
        }

        h1 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.8;
        }

        .currency-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .currency-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px 24px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Style Khusus Baris Pilihan Mata Uang Custom */
        .currency-row.custom-row {
            background: var(--bg-custom-row);
            border: 1px dashed rgba(56, 189, 248, 0.3);
        }

        .currency-row:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.85);
            transform: translateY(-2px);
        }

        .currency-row.custom-row:hover {
            border-color: var(--border-focus);
            background: rgba(56, 189, 248, 0.1);
        }

        .currency-row:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 25px var(--accent-glow);
            background: #1e293b;
            transform: translateY(-2px);
        }

        .currency-label {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            width: 55%;
        }

        .flag-wrapper {
            font-size: 32px;
            line-height: 1;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3));
        }

        .code-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Style Dropdown Select Modern */
        .currency-select {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
            outline: none;
            cursor: pointer;
            padding-right: 4px;
            -webkit-appearance: none;
            appearance: none;
        }

        /* Ikon panah kecil untuk dropdown custom */
        .select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .select-wrapper::after {
            content: "\f0d7";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 12px;
            color: var(--border-focus);
            pointer-events: none;
        }

        /* Mengubah warna latar belakang daftar opsi dropdown di browser */
        .currency-select option {
            background-color: #1e293b;
            color: var(--text-main);
            font-weight: 500;
            font-size: 14px;
        }

        .code {
            font-weight: 800;
            font-size: 18px;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .trend-badge {
            font-size: 11px;
            font-weight: 700;
        }
        .trend-up { color: var(--success); }
        .trend-down { color: var(--danger); }

        .name {
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            margin-top: 2px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .input-area {
            display: flex;
            align-items: center;
            flex-grow: 1;
            justify-content: flex-end;
            margin-left: 10px;
            width: 45%;
        }

        .symbol {
            font-size: 18px;
            font-weight: 700;
            color: var(--border-focus);
            margin-right: 10px;
            user-select: none;
        }

        .currency-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
            background: transparent;
            letter-spacing: -0.5px;
        }

        .currency-input::placeholder {
            color: rgba(148, 163, 184, 0.2);
        }

        .currency-input::-webkit-outer-spin-button,
        .currency-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .currency-input[type=number] {
            -moz-appearance: textfield;
        }

        .footer-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            padding: 0 4px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        #update-time { transition: color 0.3s ease; }
        .flash-update { color: var(--success) !important; font-weight: bold; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 211, 153, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 11px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        .loading-screen {
            text-align: center;
            padding: 40px 0;
            font-size: 16px;
            color: var(--border-focus);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        @media (max-width: 480px) {
            .container { padding: 24px; }
            h1 { font-size: 22px; }
            .header-logo { font-size: 22px; }
            .currency-row { padding: 14px 16px; }
            .currency-input { font-size: 20px; }
            .flag-wrapper { font-size: 26px; }
            .code, .currency-select { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="title-container">
                <i class="fa-solid fa-coins header-logo"></i>
                <h1>Currency Monitor</h1>
            </div>
            <p class="subtitle">Live data & visual trend konversi otomatis global</p>
        </header>
        
        <div id="main-content">
            <p class="loading-screen">Menghubungkan ke live rate server...</p>
        </div>

        <div class="footer-status">
            <span id="update-time">Sinkronisasi data...</span>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Live</span>
            </div>
        </div>
    </div>

    <script>
        const apiURL = "https://open.er-api.com/v6/latest/USD";
        
        let usdRates = {}; 
        let currentFocusCode = null; 

        // 4 Mata uang utama tetap di atas
        const currencies = [
            { code: "IDR", name: "Indonesian Rupiah", flag: "🇮🇩", symbol: "Rp" },
            { code: "USD", name: "US Dollar", flag: "🇺🇸", symbol: "$" },
            { code: "CNY", name: "Chinese Yuan", flag: "🇨🇳", symbol: "¥" },
            { code: "THB", name: "Thai Baht", flag: "🇹🇭", symbol: "฿" }
        ];

        // Daftar mata uang pilihan untuk baris ke-5 (Bisa ditambah sesukamu)
        const optionalCurrencies = [
            { code: "EUR", name: "Euro (European Union)", flag: "🇪🇺", symbol: "€" },
            { code: "JPY", name: "Japanese Yen", flag: "🇯🇵", symbol: "¥" },
            { code: "GBP", name: "British Pound", flag: "🇬🇧", symbol: "£" },
            { code: "AUD", name: "Australian Dollar", flag: "🇦🇺", symbol: "A$" },
            { code: "SGD", name: "Singapore Dollar", flag: "🇸🇬", symbol: "S$" },
            { code: "MYR", name: "Malaysian Ringgit", flag: "🇲🇾", symbol: "RM" },
            { code: "KRW", name: "South Korean Won", flag: "🇰🇷", symbol: "₩" },
            { code: "SAR", name: "Saudi Arabian Riyal", flag: "🇸🇦", symbol: "SR" }
        ];

        // Default mata uang custom pilihan pertama saat web dimuat
        let selectedCustomCurrency = optionalCurrencies[0]; 

        let lastInputAmount = 1000000;
        let lastSourceCurrency = "IDR";

        // Acak tren awal
        currencies.forEach(c => c.trend = (Math.random() * 0.4 - 0.2).toFixed(2));
        optionalCurrencies.forEach(c => c.trend = (Math.random() * 0.4 - 0.2).toFixed(2));

        async function fetchRatesFromServer(isSilentUpdate = false) {
            try {
                const response = await fetch(apiURL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                usdRates = data.rates; 
                
                if (isSilentUpdate) {
                    [...currencies, ...optionalCurrencies].forEach(c => {
                        const shift = parseFloat((Math.random() * 0.1 - 0.05).toFixed(2));
                        c.trend = (parseFloat(c.trend) + shift).toFixed(2);
                    });
                }
                
                if (!isSilentUpdate) {
                    renderDashboard();
                } else {
                    updateTrendUI();
                }
                
                updateAllInputs(lastInputAmount, lastSourceCurrency);

                const now = new Date();
                const updateTimeText = now.toLocaleString('id-ID', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' 
                });
                
                const timeEl = document.getElementById("update-time");
                timeEl.innerText = "Terakhir Diperbarui: " + updateTimeText;
                
                if (isSilentUpdate) {
                    timeEl.classList.add("flash-update");
                    setTimeout(() => timeEl.classList.remove("flash-update"), 800);
                }

            } catch (error) {
                console.error(error);
                if (!isSilentUpdate) {
                    document.getElementById("main-content").innerHTML = `<p style='color:#f87171; text-align:center; font-weight:600; padding:20px 0;'>Gagal memuat kurs. Silakan coba beberapa saat lagi.</p>`;
                }
            }
        }

        function renderDashboard() {
            const contentDiv = document.getElementById("main-content");
            contentDiv.innerHTML = ""; 

            const listContainer = document.createElement("div");
            listContainer.className = "currency-list";

            // 1. Render 4 baris utama
            currencies.forEach(curr => {
                const isUp = curr.trend >= 0;
                const row = document.createElement("div");
                row.className = "currency-row";
                row.innerHTML = `
                    <div class="currency-label">
                        <div class="flag-wrapper">${curr.flag}</div>
                        <div>
                            <div class="code-container">
                                <span class="code">${curr.code}</span>
                                <span class="trend-badge ${isUp ? 'trend-up' : 'trend-down'}" id="trend-${curr.code}">${isUp ? '+' : ''}${curr.trend}%</span>
                            </div>
                            <span class="name">${curr.name}</span>
                        </div>
                    </div>
                    <div class="input-area">
                        <span class="symbol">${curr.symbol}</span>
                        <input type="number" class="currency-input" id="input-${curr.code}" placeholder="0">
                    </div>
                `;
                listContainer.appendChild(row);
            });

            // 2. Render Baris ke-5 (Baris Pilihan / Custom)
            const isCustomUp = selectedCustomCurrency.trend >= 0;
            const customRow = document.createElement("div");
            customRow.className = "currency-row custom-row";
            customRow.innerHTML = `
                <div class="currency-label">
                    <div class="flag-wrapper" id="custom-flag">${selectedCustomCurrency.flag}</div>
                    <div style="width: 100%;">
                        <div class="code-container">
                            <div class="select-wrapper">
                                <select class="currency-select" id="custom-currency-picker">
                                    ${optionalCurrencies.map(c => `<option value="${c.code}" ${c.code === selectedCustomCurrency.code ? 'selected' : ''}>${c.code}</option>`).join('')}
                                </select>
                            </div>
                            <span class="trend-badge ${isCustomUp ? 'trend-up' : 'trend-down'}" id="trend-custom">${isCustomUp ? '+' : ''}${selectedCustomCurrency.trend}%</span>
                        </div>
                        <span class="name" id="custom-name">${selectedCustomCurrency.name}</span>
                    </div>
                </div>
                <div class="input-area">
                    <span class="symbol" id="custom-symbol">${selectedCustomCurrency.symbol}</span>
                    <input type="number" class="currency-input" id="input-custom" placeholder="0">
                </div>
            `;
            listContainer.appendChild(customRow);
            contentDiv.appendChild(listContainer);

            // Pasang Event Listener untuk 4 Input utama
            currencies.forEach(curr => {
                const inputEl = document.getElementById(`input-${curr.code}`);
                inputEl.addEventListener("focus", () => currentFocusCode = curr.code);
                inputEl.addEventListener("input", function() {
                    let amount = parseFloat(this.value) || 0;
                    lastInputAmount = amount;
                    lastSourceCurrency = curr.code;
                    updateAllInputs(amount, curr.code);
                });
            });

            // Pasang Event Listener untuk Input Custom (Baris ke-5)
            const customInputEl = document.getElementById("input-custom");
            customInputEl.addEventListener("focus", () => currentFocusCode = "CUSTOM");
            customInputEl.addEventListener("input", function() {
                let amount = parseFloat(this.value) || 0;
                lastInputAmount = amount;
                lastSourceCurrency = selectedCustomCurrency.code;
                updateAllInputs(amount, selectedCustomCurrency.code);
            });

            // Event Listener waktu Dropdown Pilihan Mata Uang diubah
            const pickerEl = document.getElementById("custom-currency-picker");
            pickerEl.addEventListener("change", function() {
                const targetCode = this.value;
                selectedCustomCurrency = optionalCurrencies.find(c => c.code === targetCode);
                
                // Update tampilan teks baris custom secara instan
                document.getElementById("custom-flag").innerText = selectedCustomCurrency.flag;
                document.getElementById("custom-name").innerText = selectedCustomCurrency.name;
                document.getElementById("custom-symbol").innerText = selectedCustomCurrency.symbol;
                
                const isUp = selectedCustomCurrency.trend >= 0;
                const trendEl = document.getElementById("trend-custom");
                trendEl.className = `trend-badge ${isUp ? 'trend-up' : 'trend-down'}`;
                trendEl.innerText = `${isUp ? '+' : ''}${selectedCustomCurrency.trend}%`;
                
                // Hitung ulang konversinya menggunakan data jumlah terakhir input
                updateAllInputs(lastInputAmount, lastSourceCurrency);
            });
        }

        function updateTrendUI() {
            // Update 4 bursa utama
            currencies.forEach(curr => {
                const trendEl = document.getElementById(`trend-${curr.code}`);
                if (trendEl) {
                    const isUp = curr.trend >= 0;
                    trendEl.className = `trend-badge ${isUp ? 'trend-up' : 'trend-down'}`;
                    trendEl.innerText = `${isUp ? '+' : ''}${curr.trend}%`;
                }
            });
            // Update tren baris custom
            const customTrendEl = document.getElementById("trend-custom");
            if (customTrendEl) {
                const isUp = selectedCustomCurrency.trend >= 0;
                customTrendEl.className = `trend-badge ${isUp ? 'trend-up' : 'trend-down'}`;
                customTrendEl.innerText = `${isUp ? '+' : ''}${selectedCustomCurrency.trend}%`;
            }
        }

        function updateAllInputs(inputAmount, sourceCurrencyCode) {
            if (!usdRates[sourceCurrencyCode]) return;
            let amountInUSD = inputAmount / usdRates[sourceCurrencyCode];

            // 1. Update 4 input utama jika tidak sedang difokuskan
            currencies.forEach(curr => {
                if (curr.code !== currentFocusCode) {
                    const targetInput = document.getElementById(`input-${curr.code}`);
                    if (targetInput) {
                        let targetValue = amountInUSD * usdRates[curr.code];
                        targetInput.value = targetValue === 0 ? "" : targetValue.toFixed(curr.code === "IDR" ? 0 : 2);
                    }
                }
            });

            // 2. Update input custom jika tidak sedang difokuskan
            if (currentFocusCode !== "CUSTOM") {
                const customInput = document.getElementById("input-custom");
                if (customInput) {
                    let targetValue = amountInUSD * usdRates[selectedCustomCurrency.code];
                    customInput.value = targetValue === 0 ? "" : targetValue.toFixed(selectedCustomCurrency.code === "IDR" ? 0 : 2);
                }
            }
        }

        fetchRatesFromServer();
        setInterval(() => fetchRatesFromServer(true), 10000); 
    </script>
</body>
</html>
